<body>
  <!-- Theme selection inputs at the absolute root -->

  <input type="radio" name="theme" id="theme-retro" class="theme-radio">

      <div class="switchers-container">

          <label for="theme-aurora" class="theme-lbl lbl-aurora">AURORA</label>

        </div>

        <!-- Mode Switcher Widget -->
        <div class="mode-switcher">
          <label for="mode-2p" class="mode-lbl lbl-2p">VS PLAYER</label>
          <label for="mode-ai" class="mode-lbl lbl-ai">VS COMPUTER</label>
          <span class="mode-slider"></span>
        </div>

        <!-- Difficulty Switcher Widget (hidden by default, shown when VS COMPUTER is active) -->
        <div class="difficulty-switcher">
          <label for="diff-easy" class="difficulty-lbl lbl-easy">EASY</label>
          <label for="diff-medium" class="difficulty-lbl lbl-medium">MEDIUM</label>

            <input type="checkbox" id="score-x-2" class="score-cb">
            <label for="score-x-2" class="score-star">★</label>
            <input type="checkbox" id="score-x-3" class="score-cb">
            <label for="score-x-3" class="score-star">★</label>
          </div>
        </div>

        <div class="score-vs">VS</div>

        <div class="score-player player-o-box">
          <div class="player-label">O-SECT</div>
          <div class="tally-box">
            <input type="checkbox" id="score-o-1" class="score-cb">
            <label for="score-o-1" class="score-star">★</label>
            <input type="checkbox" id="score-o-2" class="score-cb">
            <label for="score-o-2" class="score-star">★</label>
            <input type="checkbox" id="score-o-3" class="score-cb">
            <label for="score-o-3" class="score-star">★</label>
          </div>
        </div>
      </div>
      <button type="reset" class="reset-scores-btn">RESET TALLIES</button>
    </form>

    <!-- Main Board Form (for cell inputs and gameplay reset) -->

      <input type="radio" name="cell-1" id="cell-1-x" class="input-x">
      <input type="radio" name="cell-1" id="cell-1-o" class="input-o">

      <!-- Cell 2 State Inputs -->
      <input type="radio" name="cell-2" id="cell-2-x" class="input-x">

      <!-- Cell 3 State Inputs -->

      <!-- Cell 4 State Inputs -->
      <input type="radio" name="cell-4" id="cell-4-x" class="input-x">

      <!-- Cell 5 State Inputs -->
      <input type="radio" name="cell-5" id="cell-5-x" class="input-x">
      <input type="radio" name="cell-5" id="cell-5-o" class="input-o">

      <!-- Cell 6 State Inputs -->
      <input type="radio" name="cell-6" id="cell-6-x" class="input-x">
      <input type="radio" name="cell-6" id="cell-6-o" class="input-o">

      <!-- Cell 7 State Inputs -->
      <input type="radio" name="cell-7" id="cell-7-x" class="input-x">
      <input type="radio" name="cell-7" id="cell-7-o" class="input-o">

      <!-- Cell 8 State Inputs -->
      <input type="radio" name="cell-8" id="cell-8-x" class="input-x">
      <input type="radio" name="cell-8" id="cell-8-o" class="input-o">

      <!-- Cell 9 State Inputs -->
      <input type="radio" name="cell-9" id="cell-9-x" class="input-x">
      <input type="radio" name="cell-9" id="cell-9-o" class="input-o">

      <!-- Board UI & Wrapper (Dynamic 3D Tilt perspective) -->
      <div class="board-ui">

        <div class="turn-indicator-box">
          <div class="turn-indicator turn-x">
            <span class="pulse-cyan"></span> X's TURN
          </div>
          <div class="turn-indicator turn-o">
            <span class="pulse-pink"></span> O's TURN
          </div>
        </div>

        <div class="board-perspective">
          <div class="board">
            <!-- Cell 1 -->
            <div class="cell cell-1">
              <label for="cell-1-x" class="label-x" aria-label="Mark cell 1 as X"></label>
              <label for="cell-1-o" class="label-o" aria-label="Mark cell 1 as O"></label>
              <div class="mark x-mark">X</div>
              <div class="mark o-mark">O</div>
            </div>

            <!-- Cell 2 -->
            <div class="cell cell-2">
              <label for="cell-2-x" class="label-x" aria-label="Mark cell 2 as X"></label>
              <label for="cell-2-o" class="label-o" aria-label="Mark cell 2 as O"></label>
              <div class="mark x-mark">X</div>
              <div class="mark o-mark">O</div>
            </div>

            <!-- Cell 3 -->
            <div class="cell cell-3">
              <label for="cell-3-x" class="label-x" aria-label="Mark cell 3 as X"></label>
              <label for="cell-3-o" class="label-o" aria-label="Mark cell 3 as O"></label>
              <div class="mark x-mark">X</div>

            </div>

            <!-- Cell 4 -->
            <div class="cell cell-4">
              <label for="cell-4-x" class="label-x" aria-label="Mark cell 4 as X"></label>
              <label for="cell-4-o" class="label-o" aria-label="Mark cell 4 as O"></label>
              <div class="mark x-mark">X</div>
              <div class="mark o-mark">O</div>
            </div>

            <!-- Cell 5 -->
            <div class="cell cell-5">
              <label for="cell-5-x" class="label-x" aria-label="Mark cell 5 as X"></label>
              <label for="cell-5-o" class="label-o" aria-label="Mark cell 5 as O"></label>
              <div class="mark x-mark">X</div>
              <div class="mark o-mark">O</div>
            </div>

            <!-- Cell 6 -->
            <div class="cell cell-6">
              <label for="cell-6-x" class="label-x" aria-label="Mark cell 6 as X"></label>
              <label for="cell-6-o" class="label-o" aria-label="Mark cell 6 as O"></label>
              <div class="mark x-mark">X</div>
              <div class="mark o-mark">O</div>
            </div>

            <!-- Cell 7 -->
            <div class="cell cell-7">
              <label for="cell-7-x" class="label-x" aria-label="Mark cell 7 as X"></label>
              <label for="cell-7-o" class="label-o" aria-label="Mark cell 7 as O"></label>
              <div class="mark x-mark">X</div>
              <div class="mark o-mark">O</div>
            </div>

            <!-- Cell 8 -->
            <div class="cell cell-8">
              <label for="cell-8-x" class="label-x" aria-label="Mark cell 8 as X"></label>
              <label for="cell-8-o" class="label-o" aria-label="Mark cell 8 as O"></label>
              <div class="mark x-mark">X</div>
              <div class="mark o-mark">O</div>
            </div>

            <!-- Cell 9 -->
            <div class="cell cell-9">
              <label for="cell-9-x" class="label-x" aria-label="Mark cell 9 as X"></label>
              <label for="cell-9-o" class="label-o" aria-label="Mark cell 9 as O"></label>

            </div>

            <!-- Strike-through Win Lines -->
            <div class="win-line row-1"></div>
            <div class="win-line row-2"></div>
            <div class="win-line row-3"></div>
            <div class="win-line col-1"></div>
            <div class="win-line col-2"></div>
            <div class="win-line col-3"></div>
            <div class="win-line diag-1"></div>
            <div class="win-line diag-2"></div>
          </div>

          <!-- Overlays (Win / Draw Screen) -->
          <div class="overlay win-overlay">
            <div class="overlay-content">
              <h2 class="overlay-title win-x-title">VICTORY</h2>
              <h2 class="overlay-title win-o-title">VICTORY</h2>
              <p class="winner-text win-x-text">PLAYER X DOMINATED THE GRID</p>
              <p class="winner-text win-o-text">PLAYER O DOMINATED THE GRID</p>
              <button type="reset" class="neon-btn reset-btn-game">PLAY AGAIN</button>
            </div>
          </div>

          <div class="overlay draw-overlay">
            <div class="overlay-content">
              <h2 class="overlay-title draw-title">DRAW</h2>
              <p class="winner-text">THE GRID REMAINS UNCONQUERED</p>
              <button type="reset" class="neon-btn reset-btn-game">PLAY AGAIN</button>
            </div>

        <button type="reset" class="board-reset-btn">
          <span class="icon">↺</span> RESET BOARD
        </button>
      </div>

  </div>

  <!-- Smart Minimax AI Player logic -->
  <script>
    (function () {
      const boardForm = document.querySelector('.board-form');
      const modeAiInput = document.getElementById('mode-ai');

      // ------------------------------
      // Tiny WebAudio SFX (no assets)
      // ------------------------------
      let audioCtx = null;
      let lastBoardSignature = null;

      function ensureAudio() {
        if (audioCtx) return;
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        audioCtx = new Ctx();
      }

      async function primeAudio() {
        ensureAudio();
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') {
          try { await audioCtx.resume(); } catch (e) { }
        }
      }

      function tone({ freq = 440, type = 'sine', duration = 0.06, gain = 0.08, detune = 0 } = {}) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;

        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();

        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        osc.detune.setValueAtTime(detune, now);

        g.gain.setValueAtTime(0.0001, now);
        g.gain.exponentialRampToValueAtTime(gain, now + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, now + duration);

        osc.connect(g);
        g.connect(audioCtx.destination);

        osc.start(now);
        osc.stop(now + duration + 0.02);
      }

      function playMoveSound(isX) {
        // X: cyan-ish (higher pitch), O: pink-ish (lower pitch)
        tone({ freq: isX ? 740 : 520, type: 'square', duration: 0.07, gain: 0.05 });
        tone({ freq: isX ? 980 : 700, type: 'sine', duration: 0.04, gain: 0.03, detune: (isX ? 5 : -5) });
      }

      function playWinSound() {
        tone({ freq: 440, type: 'triangle', duration: 0.09, gain: 0.06 });
        setTimeout(() => tone({ freq: 660, type: 'triangle', duration: 0.09, gain: 0.06 }), 70);
        setTimeout(() => tone({ freq: 880, type: 'triangle', duration: 0.1, gain: 0.06 }), 150);
      }

      function playDrawSound() {
        tone({ freq: 330, type: 'sine', duration: 0.08, gain: 0.05 });
        setTimeout(() => tone({ freq: 300, type: 'sine', duration: 0.08, gain: 0.05 }), 70);
      }

      function playResetSound() {
        tone({ freq: 220, type: 'sawtooth', duration: 0.07, gain: 0.04 });
      }

      function getBoardStateSignature() {
        const state = [];
        for (let i = 1; i <= 9; i++) {
          const xChecked = document.getElementById(`cell-${i}-x`).checked;
          const oChecked = document.getElementById(`cell-${i}-o`).checked;
          if (xChecked) state.push('X');
          else if (oChecked) state.push('O');
          else state.push('.');
        }
        return state.join('');
      }

      function computeBoardAndMaybeSfx() {
        // Only play sounds when a new move is placed or end-state changes.
        const sig = getBoardStateSignature();
        if (sig === lastBoardSignature) return;
        lastBoardSignature = sig;

        const board = [];
        for (let i = 1; i <= 9; i++) {
          const xChecked = document.getElementById(`cell-${i}-x`).checked;
          const oChecked = document.getElementById(`cell-${i}-o`).checked;
          if (xChecked) board.push('X');
          else if (oChecked) board.push('O');
          else board.push(null);
        }

        if (checkWin(board, 'X')) {
          playWinSound();
          return;
        }
        if (checkWin(board, 'O')) {
          playWinSound();
          return;
        }
        if (checkDraw(board)) {
          playDrawSound();
          return;
        }

        // Identify whose turn mark was just placed by comparing X/O counts.
        const xCount = board.filter(c => c === 'X').length;
        const oCount = board.filter(c => c === 'O').length;
        // X always makes the next move in 2P mode; in AI mode, X also makes the triggering move.
        const lastWasX = xCount > oCount;
        playMoveSound(lastWasX);
      }

      // Prime audio on any user interaction to satisfy browser autoplay policy
      document.addEventListener('pointerdown', () => primeAudio(), { once: true });
      document.addEventListener('keydown', () => primeAudio(), { once: true });

      // Attach move-end listeners (covers both human and AI moves, since both set radio.checked)
      boardForm.addEventListener('change', () => {
        // Only attempt audio after audio has been primed
        if (!audioCtx) return;
        // Don't block any game logic; just play SFX
        computeBoardAndMaybeSfx();
      });


      const diffEasyInput = document.getElementById('diff-easy');
      const diffMediumInput = document.getElementById('diff-medium');
      const diffHardInput = document.getElementById('diff-hard');
      const diffExpertInput = document.getElementById('diff-expert');
      const winCombos = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8],
        [0, 3, 6], [1, 4, 7], [2, 5, 8],
        [0, 4, 8], [2, 4, 6]
      ];

      let isThinking = false;
      let currentDifficulty = 'easy';

      boardForm.addEventListener('change', handleBoardChange);
      boardForm.addEventListener('reset', handleBoardReset);

      wireResetSounds();
      // initialize signature so first move plays correctly
      lastBoardSignature = getBoardStateSignature();





      function handleBoardReset() {
        isThinking = false;
      }

      function handleBoardChange() {
        if (!modeAiInput.checked || isThinking) return;

        const board = [];
        for (let i = 1; i <= 9; i++) {
          const xChecked = document.getElementById(`cell-${i}-x`).checked;
          const oChecked = document.getElementById(`cell-${i}-o`).checked;
          if (xChecked) board.push('X');
          else if (oChecked) board.push('O');
          else board.push(null);
        }

        const xCount = board.filter(c => c === 'X').length;
        const oCount = board.filter(c => c === 'O').length;

        // Update current difficulty
        if (diffEasyInput.checked) currentDifficulty = 'easy';
        else if (diffMediumInput.checked) currentDifficulty = 'medium';
        else if (diffHardInput.checked) currentDifficulty = 'hard';
        else if (diffExpertInput.checked) currentDifficulty = 'expert';

        // Computer is Player O and moves when X has placed more marks
        if (xCount > oCount && !checkWin(board, 'X') && !checkDraw(board)) {
          triggerComputerMove(board);
        }
      }

      function triggerComputerMove(board) {
        isThinking = true;

        // Disable cell clicking during computing delay
        const boardEl = document.querySelector('.board');
        boardEl.style.pointerEvents = 'none';

        // Set thinking delay based on difficulty
        let thinkingDelay = 500;
        if (currentDifficulty === 'easy') thinkingDelay = 1000;
        else if (currentDifficulty === 'medium') thinkingDelay = 750;
        else if (currentDifficulty === 'hard') thinkingDelay = 500;
        else if (currentDifficulty === 'expert') thinkingDelay = 300;

        setTimeout(() => {
          if (!isThinking) {
            boardEl.style.pointerEvents = 'auto';
            return;
          }

          const bestMove = getBestMove(board, currentDifficulty);
          if (bestMove !== -1) {
            const radioO = document.getElementById(`cell-${bestMove + 1}-o`);
            if (radioO) {
              radioO.checked = true;
              radioO.dispatchEvent(new Event('change', { bubbles: true }));
            }
          }

          boardEl.style.pointerEvents = 'auto';
          isThinking = false;
        }, thinkingDelay);
      }

      function checkWin(board, player) {
        return winCombos.some(combo => combo.every(idx => board[idx] === player));
      }

      function checkDraw(board) {
        return board.every(c => c !== null);
      }

      // Reset sound: board-form reset and overlay/play-again reset
      function wireResetSounds() {
        // board reset (type=reset on board-form controls)
        boardForm.addEventListener('reset', () => {
          if (!audioCtx) return;
          playResetSound();
          lastBoardSignature = null;
        });

        // overlay/play again uses type=reset outside boardForm; capture globally
        document.addEventListener('reset', (e) => {
          // Avoid double-play if it already handled by boardForm reset
          if (e.target === boardForm) return;
          if (!audioCtx) return;
          playResetSound();
          lastBoardSignature = null;
        }, true);
      }


      function minimax(board, depth, isMax) {
        if (checkWin(board, 'O')) return 10 - depth;
        if (checkWin(board, 'X')) return depth - 10;
        if (checkDraw(board)) return 0;

        if (isMax) {
          let best = -Infinity;
          for (let i = 0; i < 9; i++) {
            if (board[i] === null) {
              board[i] = 'O';
              best = Math.max(best, minimax(board, depth + 1, false));
              board[i] = null;
            }
          }
          return best;
        } else {
          let best = Infinity;
          for (let i = 0; i < 9; i++) {
            if (board[i] === null) {
              board[i] = 'X';
              best = Math.min(best, minimax(board, depth + 1, true));
              board[i] = null;
            }
          }
          return best;
        }
      }

      function getBestMove(board, difficulty = 'expert') {
        // Get all possible moves
        const possibleMoves = [];
        for (let i = 0; i < 9; i++) {
          if (board[i] === null) {
            possibleMoves.push(i);
          }
        }

        // Different strategies based on difficulty
        if (difficulty === 'easy') {
          // Easy: Random moves with some basic logic
          return getEasyMove(board, possibleMoves);
        } else if (difficulty === 'medium') {
          // Medium: Minimax with some randomness
          return getMediumMove(board, possibleMoves);
        } else if (difficulty === 'hard') {
          // Hard: Full minimax
          return getHardMove(board);
        } else {
          // Expert: Full minimax with lookahead
          return getExpertMove(board);
        }
      }

      function getEasyMove(board, possibleMoves) {
        // Easy: Make random moves, but prioritize winning or blocking
        const winningMoves = [];
        const blockingMoves = [];
        const centerMove = possibleMoves.includes(4) ? 4 : -1;
        const cornerMoves = possibleMoves.filter(i => [0, 2, 6, 8].includes(i));

        // Check for winning moves
        for (const move of possibleMoves) {
          board[move] = 'O';
          if (checkWin(board, 'O')) {
            winningMoves.push(move);
          }
          board[move] = null;
        }

        // Check for blocking moves (preventing X from winning)
        for (const move of possibleMoves) {
          board[move] = 'X';
          if (checkWin(board, 'X')) {
            blockingMoves.push(move);
          }
          board[move] = null;
        }

        // Priority: winning > blocking > center > corners > edges
        if (winningMoves.length > 0) {
          return winningMoves[Math.floor(Math.random() * winningMoves.length)];
        } else if (blockingMoves.length > 0) {
          return blockingMoves[Math.floor(Math.random() * blockingMoves.length)];
        } else if (centerMove !== -1) {
          return centerMove;
        } else if (cornerMoves.length > 0) {
          return cornerMoves[Math.floor(Math.random() * cornerMoves.length)];
        } else {
          return possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
        }
      }

      function getMediumMove(board, possibleMoves) {
        // Medium: Minimax with 25% chance of random move
        if (Math.random() < 0.25) {
          return getEasyMove(board, possibleMoves);
        }

        // Use minimax but with limited depth
        let bestVal = -Infinity;
        let bestMove = -1;
        for (let i = 0; i < 9; i++) {
          if (board[i] === null) {
            board[i] = 'O';
            let moveVal = minimax(board, 0, false);
            board[i] = null;
            if (moveVal > bestVal) {
              bestVal = moveVal;
              bestMove = i;
            }
          }
        }
        return bestMove;
      }

      function getHardMove(board) {
        // Hard: Full minimax with depth 1
        let bestVal = -Infinity;
        let bestMove = -1;
        for (let i = 0; i < 9; i++) {
          if (board[i] === null) {
            board[i] = 'O';
            let moveVal = minimax(board, 0, false);
